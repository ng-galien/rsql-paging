name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set Maven version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.version }} -DprocessAllModules=true --batch-mode --no-transfer-progress

      - name: Build & verify
        run: mvn verify --batch-mode --no-transfer-progress

      - name: Publish to GitHub Packages
        run: mvn deploy -pl rsql-paging-lib --batch-mode --no-transfer-progress -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: rsql-paging-lib/target/rsql-paging-${{ steps.version.outputs.version }}.jar
